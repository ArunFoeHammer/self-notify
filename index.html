<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SN - Self Notification System</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a73e8">
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 80%;
        }
        h1 { color: #1a73e8; }
        #token-display {
            margin-top: 1rem;
            padding: 1rem;
            background: #e8f0fe;
            border: 1px solid #d2e3fc;
            word-break: break-all;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SN Self-Notification System</h1>
        <p>Status: <span id="status">Initializing...</span></p>
        <div id="token-display">No token retrieved yet.</div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const tokenEl = document.getElementById('token-display');

        async function init() {
            if ('serviceWorker' in navigator) {
                try {
                    const registration = await navigator.serviceWorker.register('/sw.js');
                    console.log('SW registered:', registration);
                    statusEl.textContent = 'Service Worker Registered';
                } catch (err) {
                    console.error('SW registration failed:', err);
                    statusEl.textContent = 'Service Worker Failed';
                }
            } else {
                statusEl.textContent = 'Service Workers not supported';
            }

            // Logic for FCM token retrieval would go here in a future step
        }

        init();
    </script>
</body>
</html>
