<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self Notification PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a73e8">
    <!-- Firebase SDKs (v12.12.1) -->
    <script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-messaging-compat.js"></script>
    <!-- Shared Firebase Configuration -->
    <script src="firebase-config.js"></script>
    <!-- Application Logic -->
    <script src="app.js" defer></script>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 400px;
        }
        h1 { color: #1a73e8; margin-top: 0; }
        #status { font-weight: bold; }
        #token-display {
            margin-top: 1rem;
            padding: 1rem;
            background: #e8f0fe;
            border: 1px solid #d2e3fc;
            word-break: break-all;
            font-family: monospace;
            font-size: 0.9rem;
            text-align: left;
        }
        #version-info {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #666;
        }
        .btn {
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn:disabled { background: #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Self-Notification PWA</h1>
        <p>Status: <span id="status">Initializing...</span></p>
        
        <button id="permission-btn" class="btn" style="display: none;">Enable Notifications</button>
        <button id="token-btn" class="btn" style="display: none;">Get Token</button>
        
        <div id="token-display">No token retrieved yet.</div>

        <div id="version-info">
            SW Version: <span id="sw-version">Detecting...</span>
        </div>
    </div>
</body>
</html>
